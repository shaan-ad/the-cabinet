<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Cabinet - 26 AI Executive Personas for Claude Code</title>
<meta name="description" content="26 AI executive personas for Claude Code. Every leader needs a cabinet. Get perspectives from every leadership angle.">
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: #0a0a0a;
    color: #e2e8f0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== LAYOUT ===== */
  .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

  /* ===== HERO ===== */
  .hero {
    min-height: 85vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 80px 24px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background:
      radial-gradient(ellipse at 30% 50%, rgba(124,58,237,0.15), transparent 50%),
      radial-gradient(ellipse at 70% 50%, rgba(236,72,153,0.1), transparent 50%);
    animation: hero-drift 8s ease-in-out infinite alternate;
  }
  @keyframes hero-drift {
    0% { transform: translate(0, 0); }
    100% { transform: translate(-30px, 20px); }
  }
  .hero-content { position: relative; z-index: 1; max-width: 720px; }
  .hero h1 {
    font-size: 72px;
    font-weight: 800;
    letter-spacing: -3px;
    line-height: 1.0;
    margin-bottom: 20px;
    background: linear-gradient(135deg, #ffffff 0%, #c4b5fd 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero .tagline {
    font-size: 20px;
    color: #9ca3af;
    margin-bottom: 40px;
    line-height: 1.6;
  }
  .hero .tagline strong { color: #c4b5fd; font-weight: 600; }

  /* ===== INSTALL BOX ===== */
  .install-box {
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: rgba(139,92,246,0.08);
    border: 1px solid rgba(139,92,246,0.25);
    border-radius: 14px;
    padding: 18px 24px;
    max-width: 560px;
    margin: 0 auto 44px;
    text-align: left;
  }
  .install-step {
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .install-step:hover { opacity: 0.8; }
  .install-label {
    font-size: 11px;
    font-weight: 600;
    color: #7c3aed;
    text-transform: uppercase;
    letter-spacing: 1px;
    min-width: 48px;
  }
  .install-cmd {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 13px;
    color: #c4b5fd;
    flex: 1;
  }
  .install-copy {
    color: #7c3aed;
    font-size: 16px;
    cursor: pointer;
    transition: color 0.2s;
    background: none;
    border: none;
    padding: 4px;
  }
  .install-copy:hover { color: #a78bfa; }
  .install-copy.copied { color: #34d399; }

  /* ===== STATS ===== */
  .stats {
    display: flex;
    gap: 48px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .stat { text-align: center; }
  .stat-num {
    font-size: 32px;
    font-weight: 800;
    color: #a78bfa;
    line-height: 1;
  }
  .stat-label {
    font-size: 12px;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 6px;
  }

  /* ===== SECTION ===== */
  .section {
    padding: 80px 24px;
  }
  .section-header {
    text-align: center;
    margin-bottom: 48px;
  }
  .section-title {
    font-size: 40px;
    font-weight: 800;
    letter-spacing: -1.5px;
    margin-bottom: 12px;
  }
  .section-sub {
    font-size: 18px;
    color: #9ca3af;
    max-width: 600px;
    margin: 0 auto;
  }

  /* ===== EXPLAINER ===== */
  .explainer {
    max-width: 740px;
    margin: 0 auto;
    padding: 60px 24px 0;
    text-align: center;
  }
  .explainer p {
    font-size: 20px;
    line-height: 1.7;
    color: #9ca3af;
  }

  /* ===== TABS ===== */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 32px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 4px;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
  }
  .tab {
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    color: #9ca3af;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    background: none;
  }
  .tab:hover { color: #e2e8f0; }
  .tab.active {
    background: linear-gradient(135deg, #7c3aed, #6d28d9);
    color: white;
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ===== PERSONA GRID ===== */
  .persona-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* ===== PERSONA CARD ===== */
  .persona-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    padding: 22px;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .persona-card:hover {
    background: rgba(139,92,246,0.06);
    border-color: rgba(139,92,246,0.25);
    transform: translateY(-2px);
  }
  .persona-card.expanded {
    background: rgba(139,92,246,0.08);
    border-color: rgba(139,92,246,0.35);
  }
  .persona-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 12px;
  }
  .persona-icon {
    width: 44px;
    height: 44px;
    background: rgba(139,92,246,0.1);
    border-radius: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .persona-icon svg {
    width: 22px;
    height: 22px;
    stroke: #a78bfa;
    stroke-width: 1.75;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .persona-name {
    font-size: 17px;
    font-weight: 700;
    color: #e2e8f0;
    line-height: 1.2;
  }
  .persona-role {
    font-size: 12px;
    color: #a78bfa;
    margin-top: 2px;
  }
  .persona-lens {
    font-size: 14px;
    color: #9ca3af;
    line-height: 1.5;
    margin-bottom: 14px;
  }
  .persona-questions-label {
    font-size: 10px;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
  }
  .persona-q {
    font-size: 13px;
    color: #c4b5fd;
    padding: 3px 0;
    line-height: 1.5;
    font-style: italic;
  }

  /* ===== EXPANDED CARD CONTENT ===== */
  .persona-expanded {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }
  .persona-card.expanded .persona-expanded {
    max-height: 400px;
  }
  .persona-expanded-inner {
    padding-top: 16px;
    margin-top: 16px;
    border-top: 1px solid rgba(139,92,246,0.15);
  }
  .expanded-label {
    font-size: 10px;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
  }
  .framework-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }
  .framework-tag {
    background: rgba(139,92,246,0.12);
    color: #a78bfa;
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
  }
  .pushback-text {
    font-size: 13px;
    color: #9ca3af;
    line-height: 1.5;
    margin-bottom: 14px;
  }
  .example-prompt {
    background: rgba(0,0,0,0.4);
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 13px;
    color: #c4b5fd;
  }

  /* ===== HOW IT WORKS ===== */
  .steps {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    max-width: 900px;
    margin: 0 auto 48px;
  }
  .step {
    text-align: center;
    padding: 32px 24px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
  }
  .step-num {
    font-size: 14px;
    font-weight: 700;
    color: #7c3aed;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }
  .step-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .step-desc {
    font-size: 14px;
    color: #9ca3af;
    line-height: 1.5;
  }
  .step-example {
    margin-top: 12px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 12px;
    color: #c4b5fd;
    background: rgba(0,0,0,0.3);
    padding: 8px 12px;
    border-radius: 6px;
    text-align: left;
  }

  /* Install tabs (how it works section) */
  .install-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 4px;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
  }
  .install-tab {
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    color: #9ca3af;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    background: none;
  }
  .install-tab:hover { color: #e2e8f0; }
  .install-tab.active {
    background: rgba(139,92,246,0.2);
    color: #c4b5fd;
  }
  .install-panel { display: none; text-align: center; }
  .install-panel.active { display: block; }
  .install-panel code {
    display: block;
    background: rgba(0,0,0,0.4);
    border-radius: 10px;
    padding: 16px 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 14px;
    color: #c4b5fd;
    max-width: 600px;
    margin: 0 auto;
    text-align: left;
    line-height: 1.8;
  }
  .install-panel ol {
    text-align: left;
    max-width: 600px;
    margin: 0 auto;
    color: #9ca3af;
    font-size: 14px;
    line-height: 1.8;
  }
  .install-panel p {
    color: #9ca3af;
    font-size: 14px;
    max-width: 600px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* ===== COMPARISON TABLE ===== */
  .comparison {
    max-width: 900px;
    margin: 0 auto;
    overflow-x: auto;
  }
  .comparison table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  .comparison th, .comparison td {
    padding: 16px 20px;
    text-align: left;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .comparison th {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #6b7280;
  }
  .comparison th:last-child {
    color: #a78bfa;
  }
  .comparison td { color: #9ca3af; }
  .comparison td:first-child {
    font-weight: 600;
    color: #e2e8f0;
  }
  .comparison td:last-child {
    color: #c4b5fd;
    font-weight: 500;
  }
  .comparison tr:hover td {
    background: rgba(139,92,246,0.04);
  }

  /* ===== FOOTER ===== */
  .footer {
    padding: 40px 24px;
    border-top: 1px solid rgba(255,255,255,0.06);
    text-align: center;
  }
  .footer-content {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .footer-headshot {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(139,92,246,0.3);
  }
  .footer-name {
    font-size: 15px;
    font-weight: 600;
    color: #e2e8f0;
  }
  .footer-links {
    display: flex;
    gap: 24px;
    justify-content: center;
    margin-top: 12px;
  }
  .footer-links a {
    font-size: 13px;
    color: #6b7280;
    text-decoration: none;
    transition: color 0.2s;
  }
  .footer-links a:hover { color: #a78bfa; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 900px) {
    .hero h1 { font-size: 52px; letter-spacing: -2px; }
    .persona-grid { grid-template-columns: repeat(2, 1fr); }
    .steps { grid-template-columns: 1fr; max-width: 400px; }
    .stats { gap: 32px; }
  }
  @media (max-width: 640px) {
    .hero h1 { font-size: 40px; letter-spacing: -1.5px; }
    .hero .tagline { font-size: 17px; }
    .hero { min-height: 70vh; padding: 60px 20px; }
    .persona-grid { grid-template-columns: 1fr; }
    .tabs { flex-wrap: wrap; width: 100%; }
    .tab { flex: 1; text-align: center; font-size: 13px; padding: 10px 12px; }
    .install-box { padding: 14px 16px; }
    .install-cmd { font-size: 11px; }
    .section-title { font-size: 30px; }
    .stats { gap: 24px; }
    .stat-num { font-size: 26px; }
    .install-tabs { flex-wrap: wrap; }
    .comparison table { font-size: 12px; }
    .comparison th, .comparison td { padding: 10px 12px; }
  }
</style>
</head>
<body>

<!-- ===== HERO ===== -->
<section class="hero">
  <div class="hero-content">
    <h1>The Cabinet</h1>
    <p class="tagline">26 AI executive personas for Claude Code.<br><strong>Every leader needs a cabinet.</strong></p>
    <div class="install-box">
      <div class="install-step" onclick="copyCmd(this)">
        <span class="install-label">Step 1</span>
        <span class="install-cmd">claude plugin marketplace add shaan-ad/the-cabinet</span>
        <button class="install-copy" aria-label="Copy command">&#128203;</button>
      </div>
      <div class="install-step" onclick="copyCmd(this)">
        <span class="install-label">Step 2</span>
        <span class="install-cmd">claude plugin install the-cabinet</span>
        <button class="install-copy" aria-label="Copy command">&#128203;</button>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-num">26</div><div class="stat-label">Personas</div></div>
      <div class="stat"><div class="stat-num">180+</div><div class="stat-label">Questions</div></div>
      <div class="stat"><div class="stat-num">50+</div><div class="stat-label">Frameworks</div></div>
      <div class="stat"><div class="stat-num">0</div><div class="stat-label">Lines of Code</div></div>
    </div>
  </div>
</section>

</body>
</html>
